<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>smart scan</title>
    <link rel="icon" href="/smart-scan-icon.svg" type="image/svg+xml" />
    <script>
      // Prevent read-only global property re-assignment errors in constrained sandboxes/iframes
      (function() {
        var properties = ['fetch', 'Headers', 'Request', 'Response'];
        properties.forEach(function(prop) {
          try {
            var original = window[prop] || globalThis[prop];
            if (original) {
              var currentVal = original;
              var descriptor = {
                get: function() {
                  return currentVal;
                },
                set: function(val) {
                  currentVal = val;
                },
                configurable: true,
                enumerable: true
              };
              Object.defineProperty(window, prop, descriptor);
              Object.defineProperty(globalThis, prop, descriptor);
            }
          } catch (e) {
            console.warn("Failed to configure writable global property " + prop + ":", e);
          }
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#f7f9fb] text-[#191c1e] antialiased selection:bg-indigo-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
